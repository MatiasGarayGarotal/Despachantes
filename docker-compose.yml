version: '3.8'

services:
  postgres:
    image: postgres:16-alpine # Versión ligera y segura
    container_name: mvp_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persistencia de datos

  pgadmin:
    image: dpage/pgadmin4
    container_name: mvp_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: ${DB_PASS} # Reutiliza la clave del .env
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data: